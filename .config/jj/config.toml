"$schema" = "https://jj-vcs.github.io/jj/latest/config-schema.json"

[user]
name = "Max Milton"
email = "max@2okki.com"

[signing]
behavior = "own"
backend = "gpg"
# nosemgrep: generic-api-key
key = "C174762F23AF46AF" # max@2okki.com [S]

[aliases]
b = ["log", "-r", "@ | ancestors(remote_bookmarks().., 2) | trunk()"]
l = ["log", "-r", "::@", "-T", "builtin_log_comfortable"]
ll = ["log", "-r", "::@", "-T", 'builtin_log_comfortable ++ diff.stat(72) ++ "\n"']
clone = ["git", "clone", "--colocate"]
# TODO: Remove once sync PR lands: https://github.com/jj-vcs/jj/pull/6826
# sync = ["util", "exec", "--", "sh", "-c", "jj git fetch && jj rebase -d 'trunk()' --skip-emptied"]
# sync = ["util", "exec", "--", "sh", "-c", "jj git fetch && jj rebase -s 'roots(mutable())' -d 'trunk()' --skip-emptied"]
# sync = ["util", "exec", "--", "sh", "-c", "jj git fetch && jj rebase -s 'roots(mutable())' -d 'reachable(@, trunk()..)' --skip-emptied"]
fetch = ["git", "fetch"]
push = ["git", "push"]
# jj rebase -d 'bookmarks(master)'
# jj rebase -d 'bookmarks(next)'

# https://github.com/sunshowers/dotfiles/blob/main/dot_jjconfig.toml
s = ["show", "@-"]

# https://oppi.li/posts/configuring_jujutsu/
tug = ["bookmark", "move", "--from", "heads(::@- & bookmarks())", "--to", "@-"]

# [revset-aliases]
# 'HEAD' = '@-'
# 'MOD' = 'latest(::@ ~ empty())'

# REF: immutable help: https://github.com/jj-vcs/jj/discussions/5669#discussioncomment-12178856
[ui]
default-command = "log" # "log" = "jj", "status" = "j" shell alias
pager = ":builtin"
merge-editor = "mergiraf"

[ui.streampager]
interface = "quit-quickly-or-clear-output"
